<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ネットワークスキャン - サイバー攻撃手法百科事典</title>
  <link rel="stylesheet" href="src/styles/main.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    .demo-controls { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem; }
    .control-row { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .control-label { font-size: 13px; color: var(--color-text-secondary); min-width: 100px; }
    .range-wrap { display: flex; align-items: center; gap: 0.5rem; flex: 1; font-family: monospace; font-size: 13px; }
    .range-wrap input[type="range"] { flex: 1; max-width: 100px; }
    .range-value { min-width: 70px; }
    .radio-group { display: flex; gap: 1rem; flex-wrap: wrap; }
    .radio-group label { display: flex; align-items: center; gap: 0.25rem; font-size: 13px; cursor: pointer; }
    .btn-group { display: flex; gap: 0.5rem; }
    .demo-btn.secondary { background: var(--color-bg-secondary); color: var(--color-text-primary); border: 1px solid var(--color-border); }
    .network-map { display: flex; justify-content: center; margin-bottom: 1rem; }
    .network-map svg { background: var(--color-bg-secondary); border-radius: var(--radius-sm); }
    .host-dot { fill: var(--color-bg-tertiary); transition: fill 0.1s; }
    .host-dot.scanning { fill: #eab308; }
    .host-dot.active { fill: #22c55e; }
    .host-dot.inactive { fill: #374151; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .host-dot.scanning { animation: pulse 0.3s ease-in-out; }
    .demo-log { max-height: 200px; }
    .log-success { color: #22c55e; }
    .log-fail { color: #6b7280; }
    .log-summary { color: #60a5fa; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a href="index.html" class="nav-btn"><i class="ti ti-arrow-left"></i> 一覧に戻る</a>
      <button class="theme-toggle" id="themeToggle" aria-label="テーマ切替"><i class="ti ti-moon"></i></button>
    </header>

    <div class="detail-header">
      <div>
        <h1 class="detail-title" id="attackName"></h1>
        <div class="detail-meta">
          <span class="badge" id="attackBadge"></span>
          <div class="risk-bar" id="riskBar"></div>
        </div>
      </div>
      <div class="detail-nav">
        <a href="detail.html?id=39" class="nav-btn"><i class="ti ti-chevron-left"></i> No.39</a>
        <a href="detail-2.html" class="nav-btn">No.02 <i class="ti ti-chevron-right"></i></a>
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-label">仕掛け方</div>
      <div class="detail-value" id="mechanism"></div>
    </div>

    <div class="detail-section">
      <div class="detail-label">攻撃フロー</div>
      <div class="flow-list" id="flow"></div>
    </div>

    <div class="detail-grid">
      <div class="detail-section">
        <div class="detail-label">攻撃対象</div>
        <div class="detail-value" id="target"></div>
      </div>
      <div class="detail-section">
        <div class="detail-label">レイヤー</div>
        <div class="detail-value" id="layer"></div>
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-label">対策</div>
      <div class="detail-value" id="countermeasure"></div>
    </div>

    <div class="detail-section">
      <div class="detail-label">実例</div>
      <div class="example-box" id="example"></div>
    </div>

    <div class="demo-section">
      <div class="demo-title"><i class="ti ti-radar"></i> ネットワークスキャン シミュレーター</div>
      <div class="demo-container">
        <div class="demo-controls">
          <div class="control-row">
            <span class="control-label">ターゲットIP</span>
            <div class="range-wrap">
              <span>192.168.1.</span>
              <input type="range" id="rangeStart" min="1" max="253" value="1">
              <span>〜</span>
              <input type="range" id="rangeEnd" min="2" max="254" value="254">
              <span class="range-value" id="rangeDisplay">1 - 254</span>
            </div>
          </div>
          <div class="control-row">
            <span class="control-label">スキャン方式</span>
            <div class="radio-group">
              <label><input type="radio" name="scanType" value="icmp" checked> ICMP Ping</label>
              <label><input type="radio" name="scanType" value="tcp"> TCP SYN</label>
              <label><input type="radio" name="scanType" value="udp"> UDP Scan</label>
            </div>
          </div>
          <div class="control-row">
            <div class="btn-group">
              <button class="demo-btn" id="startBtn"><i class="ti ti-player-play"></i> スキャン開始</button>
              <button class="demo-btn secondary" id="stopBtn" disabled><i class="ti ti-player-stop"></i> 中断</button>
            </div>
          </div>
        </div>
        <div class="network-map">
          <svg id="networkSvg" width="320" height="320" viewBox="0 0 320 320"></svg>
        </div>
        <div class="demo-log" id="logArea"></div>
      </div>
    </div>
  </div>

  <script src="./src/data/attacks.js"></script>
  <script>
    const attacks = window.attacks;
    const categories = {
      network: { label: 'ネットワーク' },
      malware: { label: 'マルウェア' },
      social: { label: 'ソーシャル' },
      web: { label: 'Web' },
      ddos: { label: 'DoS/DDoS' },
      intercept: { label: '傍受' },
      misc: { label: 'その他' }
    };

    function initTheme() {
      const saved = localStorage.getItem('theme');
      if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      updateThemeIcon();
    }

    function updateThemeIcon() {
      const btn = document.getElementById('themeToggle');
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      if (btn) btn.innerHTML = isDark ? '<i class="ti ti-sun"></i>' : '<i class="ti ti-moon"></i>';
    }

    function toggleTheme() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      if (isDark) {
        document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('theme', 'light');
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
      }
      updateThemeIcon();
    }

    const params = new URLSearchParams(window.location.search);
    const attackId = parseInt(params.get('id')) || 1;
    const attack = attacks.find(a => a.id === attackId) || attacks[0];

    document.title = `${attack.name} - サイバー攻撃手法百科事典`;
    document.getElementById('attackName').textContent = `No.${String(attack.id).padStart(2,'0')} ${attack.name}`;

    const badge = document.getElementById('attackBadge');
    badge.textContent = categories[attack.category]?.label || attack.category;
    badge.className = `badge badge-${attack.category}`;

    const riskBar = document.getElementById('riskBar');
    riskBar.innerHTML = [1,2,3,4,5].map(i =>
      `<div class="risk-dot ${i <= attack.risk ? 'r' + attack.risk : ''}"></div>`
    ).join('');

    document.getElementById('mechanism').textContent = attack.mechanism;
    document.getElementById('target').textContent = attack.target;
    document.getElementById('layer').textContent = attack.layer;
    document.getElementById('countermeasure').textContent = attack.countermeasure;
    document.getElementById('example').textContent = attack.example;

    const flowEl = document.getElementById('flow');
    flowEl.innerHTML = attack.flow.map((step, i) =>
      `<span class="flow-step">${step}</span>${i < attack.flow.length - 1 ? '<i class="ti ti-arrow-right flow-arrow"></i>' : ''}`
    ).join('');

    document.getElementById('themeToggle').addEventListener('click', toggleTheme);
    initTheme();

    const svg = document.getElementById('networkSvg');
    const logArea = document.getElementById('logArea');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const rangeStart = document.getElementById('rangeStart');
    const rangeEnd = document.getElementById('rangeEnd');
    const rangeDisplay = document.getElementById('rangeDisplay');

    let activeHosts = new Set();
    let dots = [];
    let scanInterval = null;

    function initNetwork() {
      svg.innerHTML = '';
      dots = [];
      activeHosts.clear();
      for (let i = 0; i < 256; i++) {
        if (Math.random() < 0.2) activeHosts.add(i);
      }
      for (let row = 0; row < 16; row++) {
        for (let col = 0; col < 16; col++) {
          const idx = row * 16 + col;
          const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          circle.setAttribute('cx', col * 20 + 10);
          circle.setAttribute('cy', row * 20 + 10);
          circle.setAttribute('r', 6);
          circle.classList.add('host-dot');
          svg.appendChild(circle);
          dots.push(circle);
        }
      }
    }

    function updateRangeDisplay() {
      let start = parseInt(rangeStart.value);
      let end = parseInt(rangeEnd.value);
      if (start > end) { const t = start; start = end; end = t; }
      rangeDisplay.textContent = `${start} - ${end}`;
    }

    rangeStart.addEventListener('input', updateRangeDisplay);
    rangeEnd.addEventListener('input', updateRangeDisplay);

    function formatTime(ms) {
      const s = Math.floor(ms / 1000);
      const m = ms % 1000;
      return `${String(Math.floor(s / 60)).padStart(2,'0')}:${String(s % 60).padStart(2,'0')}.${String(m).padStart(3,'0')}`;
    }

    function log(text, cls) {
      const line = document.createElement('div');
      line.className = 'demo-log-line' + (cls ? ' ' + cls : '');
      line.textContent = text;
      logArea.appendChild(line);
      logArea.scrollTop = logArea.scrollHeight;
    }

    function startScan() {
      initNetwork();
      logArea.innerHTML = '';

      let start = parseInt(rangeStart.value);
      let end = parseInt(rangeEnd.value);
      if (start > end) { const t = start; start = end; end = t; }

      const scanType = document.querySelector('input[name="scanType"]:checked').value;
      const typeLabel = { icmp: 'ICMP Echo', tcp: 'TCP SYN', udp: 'UDP Probe' }[scanType];

      let current = start;
      let responded = 0;
      const startTime = Date.now();

      startBtn.disabled = true;
      stopBtn.disabled = false;

      log(`スキャン開始: 192.168.1.${start} - 192.168.1.${end} (${typeLabel})`);

      scanInterval = setInterval(() => {
        if (current > end) {
          clearInterval(scanInterval);
          scanInterval = null;
          const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
          log('=============================', 'log-summary');
          log(`スキャン完了: ${end - start + 1}ホスト中 ${responded}台が応答`, 'log-summary');
          log(`所要時間: ${elapsed}秒`, 'log-summary');
          log('=============================', 'log-summary');
          startBtn.disabled = false;
          stopBtn.disabled = true;
          return;
        }

        const idx = current - 1;
        const dot = dots[idx];
        if (dot) {
          dot.classList.remove('scanning');
          dot.classList.add('scanning');
        }

        const isActive = activeHosts.has(idx);
        const elapsed = Date.now() - startTime;
        const ip = `192.168.1.${current}`;

        if (isActive) {
          const latency = Math.floor(Math.random() * 50) + 5;
          log(`[${formatTime(elapsed)}] ${typeLabel} → ${ip} ... Reply ${latency}ms ✅`, 'log-success');
          responded++;
          setTimeout(() => {
            if (dot) {
              dot.classList.remove('scanning');
              dot.classList.add('active');
            }
          }, 40);
        } else {
          log(`[${formatTime(elapsed)}] ${typeLabel} → ${ip} ... Timeout  ❌`, 'log-fail');
          setTimeout(() => {
            if (dot) {
              dot.classList.remove('scanning');
              dot.classList.add('inactive');
            }
          }, 40);
        }

        current++;
      }, 50);
    }

    function stopScan() {
      if (scanInterval) {
        clearInterval(scanInterval);
        scanInterval = null;
        log('--- 中断しました ---', 'log-summary');
        startBtn.disabled = false;
        stopBtn.disabled = true;
      }
    }

    startBtn.addEventListener('click', startScan);
    stopBtn.addEventListener('click', stopScan);

    initNetwork();
  </script>
</body>
</html>
