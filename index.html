<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サイバー攻撃手法百科事典</title>
  <link rel="stylesheet" href="src/styles/main.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>
  <div class="container">
    <header>
      <h1><i class="ti ti-shield-lock"></i> サイバー攻撃手法百科事典</h1>
      <button class="theme-toggle" id="themeToggle" aria-label="テーマ切替">
        <i class="ti ti-moon"></i>
      </button>
    </header>
    <div class="filter-bar" id="filters"></div>
    <div class="counter" id="counter"></div>
    <div class="attack-list" id="list"></div>
  </div>

  <script type="module">
    import { attacks } from './src/data/attacks.js';

    const categories = {
      all: { label: 'すべて', icon: 'ti-apps' },
      network: { label: 'ネットワーク', icon: 'ti-network' },
      malware: { label: 'マルウェア', icon: 'ti-bug' },
      social: { label: 'ソーシャル', icon: 'ti-users' },
      web: { label: 'Web', icon: 'ti-world' },
      ddos: { label: 'DoS/DDoS', icon: 'ti-bolt' },
      intercept: { label: '傍受', icon: 'ti-ear' },
      misc: { label: 'その他', icon: 'ti-dots' }
    };

    let currentCategory = 'all';

    function initTheme() {
      const saved = localStorage.getItem('theme');
      if (saved === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        updateThemeIcon();
      }
    }

    function updateThemeIcon() {
      const btn = document.getElementById('themeToggle');
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      if (btn) btn.innerHTML = isDark ? '<i class="ti ti-sun"></i>' : '<i class="ti ti-moon"></i>';
    }

    function toggleTheme() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      if (isDark) {
        document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('theme', 'light');
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
      }
      updateThemeIcon();
    }

    function renderFilters() {
      const el = document.getElementById('filters');
      if (!el) return;
      el.innerHTML = Object.entries(categories).map(([key, val]) =>
        `<button class="filter-btn ${key === currentCategory ? 'active' : ''}" data-cat="${key}">
          <i class="${val.icon}"></i> ${val.label}
        </button>`
      ).join('');

      el.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          currentCategory = btn.dataset.cat;
          renderFilters();
          renderList();
        });
      });
    }

    function renderList() {
      const el = document.getElementById('list');
      const counterEl = document.getElementById('counter');
      if (!el) return;

      const filtered = attacks.filter(a =>
        currentCategory === 'all' || a.category === currentCategory
      );

      if (counterEl) counterEl.textContent = `${filtered.length}件を表示`;

      el.innerHTML = filtered.map(a => {
        const riskDots = [1,2,3,4,5].map(i =>
          `<div class="risk-dot ${i <= a.risk ? 'r' + a.risk : ''}"></div>`
        ).join('');
        const highRisk = a.risk === 5 ? 'is-risk-high' : '';
        const catLabel = categories[a.category]?.label || a.category;

        return `<a href="detail.html?id=${a.id}" class="attack-row ${highRisk}" role="button" tabindex="0">
          <span class="row-id">No.${String(a.id).padStart(2, '0')}</span>
          <span class="row-name">${a.name}</span>
          <span class="badge badge-${a.category}">${catLabel}</span>
          <div class="risk-bar">${riskDots}</div>
          <span class="row-arrow"><i class="ti ti-chevron-right"></i></span>
        </a>`;
      }).join('');
    }

    const themeBtn = document.getElementById('themeToggle');
    if (themeBtn) themeBtn.addEventListener('click', toggleTheme);

    initTheme();
    renderFilters();
    renderList();
  </script>
</body>
</html>
